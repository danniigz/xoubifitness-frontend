<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Entrar — XoubiFitness</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#090909" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="XoubiFitness">
  <link rel="apple-touch-icon" href="assets/img/icon-192.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    html, body {
      height: 100%;
      background: #090909;
    }

    .login-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    /* ── HEADER con logo ── */
    .login-header {
      padding: 56px 28px 0;
      opacity: 0;
      animation: fadeInUp 0.5s 0.1s ease forwards;
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: #F5F5F5;
    }
    .login-logo span { color: #0066FF; }
    .login-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ── TÍTULO ── */
    .login-title-wrap {
      padding: 40px 28px 0;
      opacity: 0;
      animation: fadeInUp 0.5s 0.2s ease forwards;
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1.0;
      color: #F5F5F5;
      letter-spacing: 0.03em;
    }
    .login-title span { color: #0066FF; }
    .login-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      margin-top: 8px;
    }

    /* ── FORMULARIO ── */
    .login-form-wrap {
      flex: 1;
      padding: 36px 28px 0;
      opacity: 0;
      animation: fadeInUp 0.5s 0.35s ease forwards;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Campo personalizado */
    .field {
      position: relative;
      margin-bottom: 16px;
    }
    .field__label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .field__input-wrap {
      position: relative;
    }
    .field__icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      display: flex;
    }
    .field__input {
      width: 100%;
      background: #111111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 14px 14px 44px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #F5F5F5;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field__input::placeholder { color: rgba(255,255,255,0.2); }
    .field__input:focus {
      border-color: #0066FF;
      box-shadow: 0 0 0 3px rgba(0,102,255,0.15);
    }
    /* Input password — botón ver/ocultar */
    .field__input--pr { padding-right: 48px; }
    .field__toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.25);
      display: flex;
      padding: 4px;
      transition: color 0.2s;
    }
    .field__toggle:hover { color: rgba(255,255,255,0.6); }

    /* Error inline */
    .field__error {
      font-size: 0.72rem;
      color: #FF3B30;
      margin-top: 5px;
      display: none;
    }
    .field.has-error .field__input { border-color: #FF3B30; box-shadow: 0 0 0 3px rgba(255,59,48,0.12); }
    .field.has-error .field__error { display: block; }

    /* Olvidaste contraseña */
    .login-forgot {
      text-align: right;
      margin-top: -6px;
      margin-bottom: 28px;
    }
    .login-forgot a {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-forgot a:hover { color: #0066FF; }

    /* Botón de acceso */
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #0066FF;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover {
      background: #0052cc;
      box-shadow: 0 4px 24px rgba(0,102,255,0.4);
    }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    /* Spinner dentro del botón */
    .btn-login__spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .btn-login__text { display: none; }
    .btn-login.loading .btn-login__spinner { display: block; }

    /* ── FOOTER ── */
    .login-footer {
      padding: 32px 28px 48px;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 0.5s 0.5s ease forwards;
    }
    .login-footer p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
    }
    .login-footer a {
      color: #0066FF;
      font-weight: 600;
      text-decoration: none;
    }

    /* Separador decorativo */
    .login-accent-line {
      width: 40px;
      height: 3px;
      background: #0066FF;
      border-radius: 99px;
      margin: 0 0 32px;
    }

    /* Keyframes */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- Header -->
  <div class="login-header">
    <div class="login-logo">XOUBI<span>FITNESS</span></div>
    <div class="login-tagline">Tu app de fitness personal</div>
  </div>

  <!-- Título -->
  <div class="login-title-wrap">
    <div class="login-accent-line"></div>
    <h1 class="login-title">BIENVENIDA<br><span>DE VUELTA.</span></h1>
    <p class="login-subtitle">Entra para continuar con tu progreso</p>
  </div>

  <!-- Formulario -->
  <div class="login-form-wrap">
    <form class="login-form" id="login-form" novalidate>

      <!-- Email -->
      <div class="field" id="field-email">
        <label class="field__label" for="email">Correo electrónico</label>
        <div class="field__input-wrap">
          <span class="field__icon">
            <i data-lucide="mail" width="16" height="16"></i>
          </span>
          <input
            type="email"
            id="email"
            name="email"
            class="field__input"
            placeholder="tu@email.com"
            autocomplete="email"
            inputmode="email"
          />
        </div>
        <span class="field__error" id="error-email">Introduce un email válido</span>
      </div>

      <!-- Contraseña -->
      <div class="field" id="field-password">
        <label class="field__label" for="password">Contraseña</label>
        <div class="field__input-wrap">
          <span class="field__icon">
            <i data-lucide="lock" width="16" height="16"></i>
          </span>
          <input
            type="password"
            id="password"
            name="password"
            class="field__input field__input--pr"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="field__toggle" id="toggle-password" aria-label="Ver contraseña">
            <i data-lucide="eye" width="16" height="16" id="eye-icon"></i>
          </button>
        </div>
        <span class="field__error" id="error-password">Introduce tu contraseña</span>
      </div>

      <!-- Olvidé mi contraseña -->
      <div class="login-forgot">
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Botón -->
      <button type="submit" class="btn-login" id="btn-login">
        <span class="btn-login__text">ENTRAR</span>
        <div class="btn-login__spinner"></div>
      </button>

    </form>
  </div>

  <!-- Footer -->
  <div class="login-footer">
    <p>¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
  </div>

</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    initLogin();
  });

  function initLogin() {
    const form      = document.getElementById('login-form');
    const btn       = document.getElementById('btn-login');
    const passInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-password');
    const eyeIcon   = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
      const visible = passInput.type === 'text';
      passInput.type = visible ? 'password' : 'text';
      eyeIcon.setAttribute('data-lucide', visible ? 'eye' : 'eye-off');
      if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [eyeIcon] });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.classList.add('loading');
      btn.disabled = true;

      const API_URL = 'https://fitness-backend-production-724a.up.railway.app/api';

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data.message || 'Email o contraseña incorrectos';
          showError('field-email', msg);
          btn.classList.remove('loading');
          btn.disabled = false;
          return;
        }

        localStorage.setItem('xf_token', data.token);
        window.location.href = 'index.html';

      } catch (err) {
        showError('field-email', 'No se pudo conectar. Comprueba tu conexión.');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }); // ← cierra form.addEventListener
  }     // ← cierra initLogin

  function validate() {
    let ok = true;
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    clearError('field-email');
    clearError('field-password');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('field-email', 'Introduce un email válido');
      ok = false;
    }
    if (!password) {
      showError('field-password', 'Introduce tu contraseña');
      ok = false;
    }

    return ok;
  }

  function showError(fieldId, msg) {
    const field = document.getElementById(fieldId);
    const err   = field?.querySelector('.field__error');
    if (field) field.classList.add('has-error');
    if (err && msg) err.textContent = msg;
  }

  function clearError(fieldId) {
    const field = document.getElementById(fieldId);
    if (field) field.classList.remove('has-error');
  }
</script>

</body>
</html>
