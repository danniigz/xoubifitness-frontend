<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Progreso — XoubiFitness</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#090909" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="XoubiFitness">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/progreso.js" defer></script>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <span class="top-nav__logo">XOUBI<span>FITNESS</span></span>
    <div class="top-nav__actions">
      <button class="theme-toggle" aria-label="Cambiar tema">
        <i data-lucide="sun" width="18" height="18"></i>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="page-wrap">
    <div class="container">

      <div class="mb-20 stagger">
        <h1 class="font-display" style="font-size:2rem;line-height:1.1;">PROGRESO</h1>
      </div>

      <!-- Stats de peso -->
      <div class="grid-3 mb-16 stagger">
        <div class="stat-card" style="padding:14px;">
          <div class="stat-card__label">Inicio</div>
          <div class="stat-card__value" style="font-size:1.8rem;">-<span class="unit" style="font-size:.8rem;">kg</span></div>
        </div>
        <div class="stat-card" style="padding:14px;">
          <div class="stat-card__label">Actual</div>
          <div class="stat-card__value" style="font-size:1.8rem;">-<span class="unit" style="font-size:.8rem;">kg</span></div>
        </div>
        <div class="stat-card" style="padding:14px;">
          <div class="stat-card__label">Perdido</div>
          <div class="stat-card__value" style="font-size:1.8rem;color:var(--success);">-<span class="unit" style="font-size:.8rem;">kg</span></div>
        </div>
      </div>

      <!-- Filtro período -->
      <div class="flex gap-8 mb-16 stagger">
        <button class="btn btn--ghost btn--sm period-btn active" data-period="week">Semana</button>
        <button class="btn btn--ghost btn--sm period-btn" data-period="month">Mes</button>
        <button class="btn btn--ghost btn--sm period-btn" data-period="3m">3 meses</button>
        <button class="btn btn--ghost btn--sm period-btn" data-period="all">Todo</button>
      </div>

      <!-- Gráfica peso -->
      <div class="card mb-12 stagger">
        <div class="section-header">
          <span class="section-title">Evolución de peso</span>
          <button class="btn btn--primary btn--sm" data-sheet-open="sheet-add-weight">
            <i data-lucide="plus" width="13" height="13"></i>
            Registrar
          </button>
        </div>
        <div class="chart-wrap" style="height:200px;">
          <canvas id="weightChartBig"></canvas>
        </div>
      </div>

      <!-- IMC -->
      <div class="card mb-12 stagger">
        <div class="section-header mb-8">
          <span class="section-title">IMC</span>
          <span class="badge badge--success">Normal</span>
        </div>
        <div class="flex items-center gap-16">
          <div>
            <span class="font-display" style="font-size:2.8rem;line-height:1;color:var(--success);">—</span>
            <p class="text-xs text-muted mt-4">kg/m² · Rango normal: 18.5 – 24.9</p>
          </div>
          <div style="flex:1;">
            <div class="progress-bar__fill progress-bar__fill--success" style="width:0%;"></div>
              <!-- Escala IMC: 15-35. Normal empieza en 18.5 (pos ~17.5%) y 22.4 está al ~36% -->
              <div class="progress-bar__fill progress-bar__fill--success" style="width:36%;"></div>
            </div>
            <div class="flex justify-between text-xs text-muted">
              <span>15</span>
              <span>18.5</span>
              <span>25</span>
              <span>35</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Historial de registros de peso -->
      <div class="card mb-24 stagger">
        <div class="section-header">
          <span class="section-title">Historial</span>
        </div>
        <div id="weight-history"></div>

    </div>
  </main>

  <!-- FAB -->
  <button class="fab" data-sheet-open="sheet-add-weight" aria-label="Registrar peso">
    <i data-lucide="plus" width="22" height="22"></i>
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <i data-lucide="layout-dashboard" width="22" height="22"></i>
      <span>Inicio</span>
    </a>
    <a href="entreno.html" class="nav-item">
      <i data-lucide="dumbbell" width="22" height="22"></i>
      <span>Entreno</span>
    </a>
    <a href="comidas.html" class="nav-item">
      <i data-lucide="utensils" width="22" height="22"></i>
      <span>Comidas</span>
    </a>
    <a href="progreso.html" class="nav-item active">
      <i data-lucide="trending-up" width="22" height="22"></i>
      <span>Progreso</span>
    </a>
    <a href="perfil.html" class="nav-item">
      <i data-lucide="user" width="22" height="22"></i>
      <span>Perfil</span>
    </a>
  </nav>

  <!-- SHEET — registrar peso -->
  <div class="overlay" id="sheet-add-weight">
    <div class="sheet">
      <div class="sheet__handle"></div>
      <div class="sheet__title">Registrar peso</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Peso (kg)</label>
          <input type="number" step="0.1" class="form-input" placeholder="62.4" id="new-weight-val"/>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-input" id="new-weight-date"/>
        </div>
      </div>
      <div class="form-hint mb-16">Pesate siempre en las mismas condiciones para mayor precision.</div>
      <div class="flex gap-8">
        <button class="btn btn--ghost btn--full" data-sheet-close>Cancelar</button>
        <button class="btn btn--primary btn--full" id="save-weight-btn">
          <i data-lucide="save" width="15" height="15"></i>
          Guardar
        </button>
      </div>
    </div>
  </div>
  <a href="chat.html" class="fab" style="right:20px;bottom:calc(var(--nav-h) + 20px);" aria-label="FitCoach IA">
    <i data-lucide="bot" width="22" height="22"></i>
  </a>
</body>
</html>
