<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Entreno — XoubiFitness</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#090909" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/entreno.js" defer></script>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <span class="top-nav__logo">XOUBI<span>FITNESS</span></span>
    <div class="top-nav__actions">
      <button class="theme-toggle" aria-label="Cambiar tema">
        <i data-lucide="sun" width="18" height="18"></i>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="page-wrap">
    <div class="container">

      <!-- Cabecera -->
      <div class="flex items-center justify-between mb-20 stagger">
        <div>
          <p class="text-xs text-muted font-semibold" style="letter-spacing:.08em;text-transform:uppercase;" data-today></p>
          <h1 class="font-display" style="font-size:2rem;line-height:1.1;">ENTRENO</h1>
        </div>
        <button class="btn btn--primary btn--sm" data-sheet-open="sheet-nuevo-entreno">
          <i data-lucide="plus" width="15" height="15"></i>
          Nuevo
        </button>
      </div>

      <!-- Resumen semanal -->
      <div class="grid-3 mb-20 stagger">
        <div class="stat-card" style="padding:14px;">
          <div class="stat-card__label">Esta semana</div>
          <div class="stat-card__value" style="font-size:2rem;">-<span class="unit" style="font-size:.85rem;">entrenos</span></div>
        </div>
        <div class="stat-card" style="padding:14px;">
          <div class="stat-card__label">Duración total</div>
          <div class="stat-card__value" style="font-size:2rem;">-<span class="unit" style="font-size:.85rem;">min</span></div>
        </div>
        <div class="stat-card" style="padding:14px;">
          <div class="stat-card__label">Racha</div>
          <div class="stat-card__value" style="font-size:2rem;">-<span class="unit" style="font-size:.85rem;">días</span></div>
        </div>
      </div>

      <!-- Historial de entrenos -->
      <div class="section-header mb-12">
        <span class="section-title">Historial</span>
        <span class="text-xs text-muted">últimos 7 días</span>
      </div>

      <!-- Entreno del día — card expandible -->
      <div class="card mb-10 stagger" id="workout-list">
      </div>
    </div>
  </main>

  <!-- FAB — nuevo ejercicio rápido -->
  <button class="fab" data-sheet-open="sheet-nuevo-entreno" aria-label="Nuevo entreno">
    <i data-lucide="plus" width="22" height="22"></i>
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <i data-lucide="layout-dashboard" width="22" height="22"></i>
      <span>Inicio</span>
    </a>
    <a href="entreno.html" class="nav-item active">
      <i data-lucide="dumbbell" width="22" height="22"></i>
      <span>Entreno</span>
    </a>
    <a href="comidas.html" class="nav-item">
      <i data-lucide="utensils" width="22" height="22"></i>
      <span>Comidas</span>
    </a>
    <a href="progreso.html" class="nav-item">
      <i data-lucide="trending-up" width="22" height="22"></i>
      <span>Progreso</span>
    </a>
    <a href="perfil.html" class="nav-item">
      <i data-lucide="user" width="22" height="22"></i>
      <span>Perfil</span>
    </a>
  </nav>

  <!-- SHEET — nuevo entreno -->
  <div class="overlay" id="sheet-nuevo-entreno">
    <div class="sheet">
      <div class="sheet__handle"></div>
      <div class="sheet__title">Nuevo entreno</div>

      <div class="form-group">
        <label class="form-label">Nombre del entreno</label>
        <input type="text" class="form-input" placeholder="Ej. Full Body A" id="new-workout-name"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-input" id="new-workout-date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Duración (min)</label>
          <input type="number" class="form-input" placeholder="60" id="new-workout-dur"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <textarea class="form-input" rows="2" placeholder="Sensaciones, notas..."></textarea>
      </div>

      <div class="section-header mt-16 mb-12">
        <span class="section-title" style="font-size:1rem;">Ejercicios</span>
        <button class="btn btn--ghost btn--sm" id="add-exercise-btn">
          <i data-lucide="plus" width="14" height="14"></i>
          Añadir
        </button>
      </div>

      <div id="exercises-list"></div>

      <div class="flex gap-8 mt-20">
        <button class="btn btn--ghost btn--full" data-sheet-close>Cancelar</button>
        <button class="btn btn--primary btn--full" id="save-workout-btn">
          <i data-lucide="save" width="15" height="15"></i>
          Guardar
        </button>
      </div>
    </div>
  </div>
  <a href="chat.html" class="fab" style="right:20px;bottom:calc(var(--nav-h) + 20px);" aria-label="FitCoach IA">
    <i data-lucide="bot" width="22" height="22"></i>
  </a>
</body>
</html>
