<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fotos — XoubiFitness</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#090909" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/fotos.js" defer></script>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <span class="top-nav__logo">XOUBI<span>FITNESS</span></span>
    <div class="top-nav__actions">
      <button class="theme-toggle" aria-label="Cambiar tema">
        <i data-lucide="sun" width="18" height="18"></i>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="page-wrap">
    <div class="container">

      <div class="flex items-center justify-between mb-20 stagger">
        <h1 class="font-display" style="font-size:2rem;line-height:1.1;">FOTOS DE<br>PROGRESO</h1>
        <button class="btn btn--primary btn--sm" data-sheet-open="sheet-add-photo">
          <i data-lucide="camera" width="15" height="15"></i>
          Añadir
        </button>
      </div>

      <!-- Comparativa inicio / ahora -->
      <div class="card mb-16 stagger">
        <div class="section-header mb-12">
          <span class="section-title">Comparativa</span>
          <span class="badge badge--accent">Inicio vs Ahora</span>
        </div>
        <div class="grid-2">
          <div>
            <div style="aspect-ratio:3/4;background:var(--border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;border:1px solid var(--border-strong);">
              <div style="text-align:center;color:var(--text-muted);">
                <i data-lucide="image" width="28" height="28" style="margin:0 auto 8px;"></i>
                <div class="text-xs">Octubre 2024</div>
                <div class="text-xs font-semibold">68 kg</div>
              </div>
            </div>
          </div>
          <div>
            <div style="aspect-ratio:3/4;background:var(--accent-dim);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,102,255,.25);">
              <div style="text-align:center;color:var(--accent);">
                <i data-lucide="image" width="28" height="28" style="margin:0 auto 8px;"></i>
                <div class="text-xs">Hoy</div>
                <div class="text-xs font-semibold">62.4 kg</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Grid de fotos por mes -->
      <div class="section-header mb-12 stagger">
        <span class="section-title">Galería</span>
      </div>


      <div id="photos-anchor"></div>

    </div>
  </main>


  <!-- FAB -->
  <button class="fab" data-sheet-open="sheet-add-photo" aria-label="Añadir foto">
    <i data-lucide="camera" width="22" height="22"></i>
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <i data-lucide="layout-dashboard" width="22" height="22"></i>
      <span>Inicio</span>
    </a>
    <a href="entreno.html" class="nav-item">
      <i data-lucide="dumbbell" width="22" height="22"></i>
      <span>Entreno</span>
    </a>
    <a href="comidas.html" class="nav-item">
      <i data-lucide="utensils" width="22" height="22"></i>
      <span>Comidas</span>
    </a>
    <a href="progreso.html" class="nav-item">
      <i data-lucide="trending-up" width="22" height="22"></i>
      <span>Progreso</span>
    </a>
    <a href="perfil.html" class="nav-item">
      <i data-lucide="user" width="22" height="22"></i>
      <span>Perfil</span>
    </a>
  </nav>

  <!-- SHEET — añadir foto -->
  <div class="overlay" id="sheet-add-photo">
    <div class="sheet">
      <div class="sheet__handle"></div>
      <div class="sheet__title">Añadir foto</div>

      <!-- Upload area -->
      <input type="file" accept="image/*" id="photo-input" style="display:none;"/>
      <div style="border:2px dashed var(--border-strong);border-radius:var(--radius-md);padding:32px;text-align:center;margin-bottom:16px;cursor:pointer;" id="photo-upload-area">
        <i data-lucide="upload-cloud" width="32" height="32" style="margin:0 auto 10px;color:var(--text-muted);"></i>
        <p class="text-sm text-secondary">Toca para seleccionar foto</p>
        <p class="text-xs text-muted mt-4">JPG, PNG hasta 10 MB</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-input" id="photo-date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Peso ese día (kg)</label>
          <input type="number" step="0.1" class="form-input" placeholder="62.4"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas (opcional)</label>
        <textarea class="form-input" rows="2" placeholder="Ej. Semana 12 de entreno..."></textarea>
      </div>

      <div class="flex gap-8 mt-8">
        <button class="btn btn--ghost btn--full" data-sheet-close>Cancelar</button>
        <button class="btn btn--primary btn--full">
          <i data-lucide="upload" width="15" height="15"></i>
          Subir foto
        </button>
      </div>
    </div>
  </div>

</body>
</html>
