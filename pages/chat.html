<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCoach IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 1.5rem;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header .avatar {
            width: 40px; height: 40px;
            background: #d4f500;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        header h1 { font-size: 1rem; font-weight: 600; }
        header p  { font-size: 0.75rem; color: #888; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .message.user {
            align-self: flex-end;
            background: #d4f500;
            color: #0f0f0f;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 0.25rem;
        }

        .message.typing {
            align-self: flex-start;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: #888;
            font-style: italic;
        }

        #input-area {
            padding: 1rem 1.5rem;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 0.75rem;
        }

        #user-input {
            flex: 1;
            background: #2a2a2a;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #f0f0f0;
            font-size: 0.9rem;
            outline: none;
            resize: none;
        }

        #user-input::placeholder { color: #555; }

        #send-btn {
            background: #d4f500;
            color: #0f0f0f;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div class="avatar">🏋️</div>
    <div>
        <h1>FitCoach IA</h1>
        <p>Tu entrenador personal inteligente</p>
    </div>
</header>

<div id="chat-box">
    <div class="message assistant">
        ¡Hola! Soy tu entrenador personal. ¿En qué puedo ayudarte hoy? 💪
    </div>
</div>

<div id="input-area">
    <textarea
            id="user-input"
            placeholder="Escribe tu pregunta..."
            rows="1"
    ></textarea>
    <button id="send-btn">Enviar</button>
</div>

<script>
    const API_URL   = 'https://fitness-backend-production-724a.up.railway.app/api';
    const TOKEN     = localStorage.getItem('xf_token'); // Token de Sanctum

    const chatBox   = document.getElementById('chat-box');
    const input     = document.getElementById('user-input');
    const sendBtn   = document.getElementById('send-btn');

    // Cargar historial al entrar
    async function loadHistory() {
        try {
            const res = await fetch(`${API_URL}/chat/history`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await res.json();
            data.forEach(msg => appendMessage(msg.role, msg.message));
        } catch (e) {
            console.error('Error cargando historial:', e);
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.classList.add('message', role);
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        input.value = '';
        sendBtn.disabled = true;

        appendMessage('user', message);

        // Indicador de escritura
        const typing = appendMessage('typing', 'FitCoach está escribiendo...');

        try {
            const res = await fetch(`${API_URL}/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type':  'application/json',
                    'Authorization': `Bearer ${TOKEN}`,
                    'Accept':        'application/json',
                },
                body: JSON.stringify({ message }),
            });

            const data = await res.json();
            typing.remove();

            if (data.reply) {
                appendMessage('assistant', data.reply);
            } else {
                appendMessage('assistant', 'Ha ocurrido un error. Inténtalo de nuevo.');
            }
        } catch (e) {
            typing.remove();
            appendMessage('assistant', 'No se pudo conectar con el servidor.');
        }

        sendBtn.disabled = false;
        input.focus();
    }

    // Enviar con Enter (Shift+Enter para nueva línea)
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    loadHistory();
</script>

</body>
</html>
