<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FitCoach IA — XoubiFitness</title>
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#090909" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="XoubiFitness">
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="../assets/js/app.js" defer></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        .page-wrap { display: none; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: calc(var(--nav-h) + 80px);
        }

        .msg {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.55;
            font-family: 'Inter', sans-serif;
        }
        .msg--user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg--assistant {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .msg--typing {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-style: italic;
            border-bottom-left-radius: 4px;
        }

        #input-bar {
            position: fixed;
            bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
            left: 0; right: 0;
            padding: 10px 14px;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            z-index: 90;
        }

        #user-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            resize: none;
            line-height: 1.4;
            max-height: 120px;
            transition: border-color var(--transition);
        }
        #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        #user-input::placeholder { color: var(--text-muted); }

        #send-btn {
            width: 42px; height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background var(--transition), opacity var(--transition);
            color: #fff;
        }
        #send-btn:hover { background: #0052cc; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
    <span class="top-nav__logo">XOUBI<span>FITNESS</span></span>
    <div class="top-nav__actions">
        <button class="theme-toggle" aria-label="Cambiar tema">
            <i data-lucide="sun" width="18" height="18"></i>
        </button>
    </div>
</nav>

<!-- CABECERA FITCOACH -->
<div style="margin-top:calc(var(--nav-h) + env(safe-area-inset-top));padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
    <div style="width:40px;height:40px;background:var(--accent-dim);border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i data-lucide="bot" width="18" height="18" style="color:var(--accent);"></i>
    </div>
    <div>
        <div class="font-display" style="font-size:1rem;line-height:1.1;">FITCOACH <span style="color:var(--accent);">IA</span></div>
        <div class="text-xs text-muted">Tu entrenador personal inteligente</div>
    </div>
</div>

<!-- CHAT BOX -->
<div id="chat-box">
    <div class="msg msg--assistant">
        ¡Hola! Soy FitCoach, tu entrenador personal IA. ¿En qué puedo ayudarte hoy?
    </div>
</div>

<!-- INPUT BAR -->
<div id="input-bar">
    <textarea id="user-input" placeholder="Escribe tu pregunta..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
        <i data-lucide="send" width="17" height="17"></i>
    </button>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
        <i data-lucide="layout-dashboard" width="22" height="22"></i>
        <span>Inicio</span>
    </a>
    <a href="entreno.html" class="nav-item">
        <i data-lucide="dumbbell" width="22" height="22"></i>
        <span>Entreno</span>
    </a>
    <a href="comidas.html" class="nav-item">
        <i data-lucide="utensils" width="22" height="22"></i>
        <span>Comidas</span>
    </a>
    <a href="progreso.html" class="nav-item">
        <i data-lucide="trending-up" width="22" height="22"></i>
        <span>Progreso</span>
    </a>
    <a href="perfil.html" class="nav-item">
        <i data-lucide="user" width="22" height="22"></i>
        <span>Perfil</span>
    </a>
</nav>

<script>
    const API_URL = 'https://fitness-backend-production-724a.up.railway.app/api';
    const chatBox = document.getElementById('chat-box');
    const input   = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function getToken() {
        return localStorage.getItem('xf_token');
    }

    async function loadHistory() {
        try {
            const res = await fetch(`${API_URL}/chat/history`, {
                headers: {
                    'Authorization': `Bearer ${getToken()}`,
                    'Accept': 'application/json'
                }
            });
            const data = await res.json();
            if (Array.isArray(data) && data.length > 0) {
                // Limpiar mensaje de bienvenida si hay historial
                chatBox.innerHTML = '';
                data.forEach(msg => appendMessage(msg.role, msg.message));
            }
        } catch (e) {
            console.error('Error cargando historial:', e);
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg msg--${role}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;

        appendMessage('user', message);
        const typing = appendMessage('typing', 'FitCoach está escribiendo...');

        try {
            const res = await fetch(`${API_URL}/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`,
                    'Accept': 'application/json',
                },
                body: JSON.stringify({ message }),
            });

            const data = await res.json();
            typing.remove();

            appendMessage('assistant', data.reply || 'Ha ocurrido un error. Inténtalo de nuevo.');
        } catch (e) {
            typing.remove();
            appendMessage('assistant', 'No se pudo conectar con el servidor.');
        }

        sendBtn.disabled = false;
        input.focus();
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);
    loadHistory();
</script>

</body>
</html>
